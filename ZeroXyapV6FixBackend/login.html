<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZeroXyap - License Activation</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            width: 340px;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }
        
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }
        
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .license-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            background-color: var(--dark-input-bg);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .license-input:focus {
            outline: none;
            border-color: var(--blue-color);
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.2);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue-color), var(--electric-blue));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .login-button:hover::before {
            left: 100%;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 155, 240, 0.4);
        }
        
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .login-button:disabled::before {
            display: none;
        }
        
        .status-message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .error-message {
            color: var(--error-color);
            background-color: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.2);
        }
        
        .success-message {
            color: var(--success-color);
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Improved responsive design */
        @media (max-width: 360px) {
            body {
                width: 320px;
            }
            
            .login-container {
                padding: 15px;
            }
            
            .popup-title {
                font-size: 20px;
            }
            
            .popup-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-container popup-card always-animate">
        <div class="login-header">
            <h1 class="popup-title neon-text">ZeroXyap AI</h1>
            <p class="popup-subtitle">License Activation</p>
            <p class="popup-version">v6.0 - Supabase Direct</p>
        </div>
        
        <div class="login-form">
            <input type="text" id="licenseKey" class="license-input" placeholder="Enter your license key" />
            <button id="loginButton" class="login-button">Activate License</button>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
